services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://projects.sdtcdigital.com/love-island
        - NEXT_PUBLIC_BASE_PATH=/love-island
    ports:
      - "127.0.0.1:4001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://projects.sdtcdigital.com/love-island
      NEXT_PUBLIC_BASE_PATH: /love-island
      SERVER_API_URL: http://api:3000
      ADMIN_API_KEY: ${ADMIN_API_KEY:-your-secret-admin-key}
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redisdata:
